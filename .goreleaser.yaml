version: 2

project_name: kiro-proxy-go

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: kiro-proxy-go
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: githendrik
    name: kiro-proxy-go
  mode: replace
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  extra_files:
    - glob: LICENSE

brews:
  - name: kiro-proxy-go
    homepage: https://github.com/githendrik/kiro-proxy-go
    description: "Kiro API Proxy - OpenAI-compatible proxy for Kiro"
    license: "MIT"
    repository:
      owner: githendrik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    install: |
      bin.install "kiro-proxy-go"
    test: |
      system "#{bin}/kiro-proxy-go", "--help"
    skip_upload: auto
